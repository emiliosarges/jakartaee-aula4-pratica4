<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">

<h:head>
    <title>Minha Página JSF</title>
</h:head>

<h:body>

    <h1>Lista de Produtos</h1>

    <h:form>

        <h:dataTable value="#{jsfProduto.all}" var="prod">
            <h:column>
                <h:outputText value="#{prod.codigo}" />
            </h:column>
            <h:column>
                <h:outputText value="#{prod.descricao}" />
            </h:column>
            <h:column>
                <h:commandButton value="add"
                                 action="#{jsfCompra.add(prod)}"/>
            </h:column>
        </h:dataTable>

    </h:form>
    Itens adicionados:
    <h:form>
        <h:dataTable value="#{jsfCompra.all}" var="item">
            <h:column>
                <h:outputText value="#{item.produto.codigo}" />
            </h:column>
            <h:column>
                <h:outputText value="#{item.produto.descricao}" />
            </h:column>
            <h:column>
                <h:outputText value="#{item.quantidade}" />
            </h:column>
        </h:dataTable>
    </h:form>

</h:body>
</html>
